<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowManga - Browser Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060607;
            --card-bg: #0f0f11;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text: #ffffff;
            --text-dim: #9ca3af;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Ambient background glow */
        .ambient {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            z-index: -1;
            filter: blur(100px);
        }

        header {
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to bottom right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
        }

        .hero p {
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        #search {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            width: 100%;
            max-width: 400px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        #search:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2.5rem;
            padding: 0 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        .cover-wrapper {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 2rem;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: box-shadow 0.6s ease;
        }

        .card:hover .cover-wrapper {
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
        }

        .card:hover .cover-wrapper img {
            transform: scale(1.1);
        }

        .card-info {
            padding: 0 0.5rem;
        }

        .card-info h3 {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
            transition: color 0.3s ease;
        }

        .card:hover h3 {
            color: var(--accent);
        }

        .card-info p {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>
    
    <header>
        <div class="hero">
            <p>Library Overview</p>
            <h1>FlowManga Preview</h1>
        </div>
        
        <div class="controls">
            <input type="text" id="search" placeholder="Search your collection...">
        </div>
    </header>

    <main class="grid" id="manga-grid">
        <!-- Cards will be injected here -->
    </main>

    <script>
        const mangaData = [
            {"title":"Ai no Ryuusei Cowwwwpa","coverPath":"https://uploads.mangadex.org/covers/98a90dba-73ef-4a76-9406-5f2800da0010/893a4697-3932-411a-9694-870094776100.jpg","description":"Inse, a university student who belongs to the film research club...","tags":"Sci-Fi,Sexual Violence,Aliens"},
            {"title":"Akdang-deul ui Huwonja ga Doeeotda","coverPath":"https://uploads.mangadex.org/covers/af9aad67-fe97-4174-91a4-263979d62b0b/a68fb3ea-1ad2-4e25-b84f-917f9691a11c.jpg","description":"One day, I woke up as a noble inside the game I used to play...","tags":"Reincarnation,Monsters,Action"},
            {"title":"Back to Rule Again","coverPath":"https://uploads.mangadex.org/covers/939361bd-32c5-4fb9-ba93-dce280889af4/23c6b89c-b4ba-45f7-b11b-7f831f599713.png","description":"A young man named Yang Fan was betrayed by his girlfriend...","tags":"Time Travel,Action,Long Strip"},
            {"title":"Class no Gal ni Kuuki Atsukai Sareteimasu","coverPath":"https://uploads.mangadex.org/covers/4f7ee454-7478-40d5-9eeb-b8ae8e72600d/a832da64-2efa-4af8-a966-e7757d857ca3.jpg","description":"A boy named Ryuuji Aizawa is getting treated by his gyaru classmates...","tags":"Romance,Comedy,School Life"},
            {"title":"Confession","coverPath":"https://uploads.mangadex.org/covers/c3e9fcb2-36b6-430b-acbc-fb5582487ca2/ebfe6825-dbba-4596-a8d8-4005d5d553a9.jpg","description":"A story between the handsome yet loving pilot Zhou Jingze...","tags":"Long Strip,Romance,Drama"},
            {"title":"Dark Star King","coverPath":"https://uploads.mangadex.org/covers/05f0c39f-1ae0-403c-b521-85122d4db458/ef96d7a6-ba5f-4128-aab6-2ab899ebe13c.png","description":"Su Xiaobai was on the brink of death, he was brought into a new world...","tags":"Monsters,Action,Long Strip"},
            {"title":"Manager Kim","coverPath":"https://uploads.mangadex.org/covers/a3c09565-47aa-410c-a137-a3a6e6bfa8a8/874077a1-f563-401b-ad56-b0b907355000.jpg","description":"Department head Kim, who quit his job as a special agent...","tags":"Action,Long Strip,Mafia"},
            {"title":"My Landlady Noona","coverPath":"https://uploads.mangadex.org/covers/f4b350ca-3f00-4f0f-8dce-a3b80e593200/58dfa71d-dd28-4075-984f-2ac14f0f54b8.jpg","description":"Hari, who is kind and pretty, always takes care of Min-woo...","tags":"Long Strip,Romance,Harem"},
            {"title":"The Villain Wants to Live","coverPath":"https://uploads.mangadex.org/covers/384308ae-cf17-490c-9a9e-8bb0db90c3e6/a4cb39ff-ce52-4a51-849e-ee3d0235ca26.jpg","description":"Deculein von Grahan-Yukline is the mid-boss of the AAA-grade game...","tags":"Reincarnation,Action,Psychological"},
            {"title":"Unbalance Triangle","coverPath":"https://uploads.mangadex.org/covers/8b1542ed-b510-4eee-a4e6-fcbe0fc65620/25569390-721f-4802-a183-1b4c9528fa3c.jpg","description":"Taehyun Choi lives with his sister Hakyung Choi...","tags":"Psychological,Long Strip,Romance"}
        ];

        const grid = document.getElementById('manga-grid');
        const searchInput = document.getElementById('search');

        function render(data) {
            grid.innerHTML = data.map(item => `
                <div class="card">
                    <div class="cover-wrapper">
                        <img src="${item.coverPath}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/220x330?text=No+Cover'">
                    </div>
                    <div class="card-info">
                        <h3>${item.title}</h3>
                        <p>${item.tags.split(',')[0] || 'Unknown'}</p>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = mangaData.filter(m => 
                m.title.toLowerCase().includes(query) || 
                m.tags.toLowerCase().includes(query)
            );
            render(filtered);
        });

        // Initial render
        render(mangaData);
    </script>
</body>
</html>
