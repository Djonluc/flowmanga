name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Verify accessibility rules
        run: npm run lint:a11y

      - name: Run regression tests
        run: npm test

      - name: Verify web production build
        run: npm run vite-build

      - name: Verify bundled audio resources
        shell: pwsh
        run: |
          $tracks = Get-ChildItem -Path assets/audio -Recurse -File -ErrorAction Stop
          if ($tracks.Count -eq 0) { throw "No bundled audio tracks were found." }

  rust:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Verify Rust backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
