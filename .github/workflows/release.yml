name: "Publish Release"

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "FlowManga v__VERSION__"
          releaseBody: |
            ## What's new in FlowManga v__VERSION__ 🎉

            ### ✨ New Things
            - **Filter by media type** — You can now choose to only show Images, Videos, or GIFs instead of seeing everything mixed together. Works everywhere in the app.
            - **Automatic update alerts** — FlowManga will now let you know when a new version is available so you're never out of date.
            - **Updates tab in Settings** — Check for updates manually and see a full list of what changed, right inside the app.

            ### 🛠️ Improvements
            - The adult content filter now works correctly when browsing image collections — it no longer shows content it shouldn't.
            - Better content loading for certain websites that were difficult to access.
            - General speed and stability improvements.

            ### 🐛 Bug Fixes
            - Various small issues fixed to make the app more reliable.
            - Sankaku videos are now properly hidden when you only want images.

            ---
            👇 Download the installer below — just grab the `.exe` file and run it.

          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
