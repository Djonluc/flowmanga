name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Verify web production build
        run: npm run vite-build

      - name: Load plain-language release notes
        id: release-notes
        shell: pwsh
        run: |
          $body = Get-Content -Raw RELEASE_NOTES.md
          "body<<RELEASE_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and publish FlowManga
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: FlowManga v__VERSION__
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
