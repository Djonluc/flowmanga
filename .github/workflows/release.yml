name: "Publish Release"

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "FlowManga v__VERSION__"
          releaseBody: |
            ## What's new in FlowManga v__VERSION__ 🎉

            ### ✨ New Features & Sources
            - **Rule34 Gallery Enhancements** — Added support for user authentication, better tag categorization, and an overall smoother search experience.

            ### 🛠️ Improvements & Fixes
            - **Manga Manager Updates** — We've polished the manager:
              - Fixed the chapter options button so it no longer overlaps.
              - Added a handy new chapter menu with quick actions to **Read, Open files, Re-download, or Delete**.
              - Improved background cleanup logic to keep your files tidy.
              - Fixed layout issues to make it look much better on mobile screens.

            ---
            👇 **Download the latest installer below — just run the `.exe` file!**

          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
