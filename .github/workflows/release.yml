name: "Publish Release"

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "FlowManga v__VERSION__"
          releaseBody: |
            ## FlowManga v__VERSION__

            ### New Features
            - Media type filtering system (All Media / Images / Videos / GIFs)
            - Automatic version checking with GitHub release integration
            - Update notification modal on startup
            - Updates tab in Settings with changelog viewer and manual check
            - MangaDot manga source support

            ### Improvements
            - Adult content filter now correctly applies to image collections
            - Background version polling every 24 hours
            - Slideshow and gallery performance improvements

            ### Bug Fixes
            - Various stability and UI fixes

            ---
            See the assets below to download and install this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
