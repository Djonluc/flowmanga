name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Run frontend regression tests
        run: npm test

      - name: Verify web production build
        run: npm run vite-build

      - name: Verify Rust backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Verify bundled audio resources
        shell: pwsh
        run: |
          $tracks = Get-ChildItem -Path assets/audio -Recurse -File -ErrorAction Stop
          if ($tracks.Count -eq 0) { throw "No bundled audio tracks were found." }
          Write-Host "Verified $($tracks.Count) bundled audio resource(s)."

      - name: Build unpackaged desktop executable for smoke test
        run: npx tauri build --no-bundle

      - name: Smoke test packaged application startup
        shell: pwsh
        run: |
          $exe = Get-Item src-tauri/target/release/app.exe -ErrorAction Stop
          $process = Start-Process -FilePath $exe.FullName -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 10
          if ($process.HasExited) { throw "Packaged application exited during startup with code $($process.ExitCode)." }
          Stop-Process -Id $process.Id -Force
          Write-Host "Packaged executable remained healthy through the startup smoke window."

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $package = Get-Content -Raw package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Release tag '${{ github.ref_name }}' does not match package version '$expectedTag'."
          }

      - name: Load plain-language release notes
        id: release-notes
        shell: pwsh
        run: |
          $body = Get-Content -Raw RELEASE_NOTES.md
          "body<<RELEASE_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and publish FlowManga
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: FlowManga v__VERSION__
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false

      - name: Publish installer checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not produced." }
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          $checksumPath = "$($installer.FullName).sha256"
          "$hash  $($installer.Name)" | Set-Content -Encoding ascii $checksumPath
          gh release upload "${{ github.ref_name }}" $checksumPath --clobber
